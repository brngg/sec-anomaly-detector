name: SEC Daily Demo Refresh

on:
  schedule:
    # 14:00 UTC is morning in US time zones.
    - cron: "0 14 * * *"
  workflow_dispatch:

concurrency:
  group: sec-daily-refresh
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  daily-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion poller
        env:
          DB_BACKEND: "postgres"
          DATABASE_URL_RW: ${{ secrets.DATABASE_URL_RW }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_RW }}
          SEC_IDENTITY: ${{ secrets.SEC_IDENTITY }}
          POLL_ENABLE_CATCHUP: "1"
          POLL_CATCHUP_DAYS: "2"
          POLL_CATCHUP_COOLDOWN_HOURS: "48"
          POLL_CURRENT_PAGE_SIZE: "100"
          POLL_FEED_BUFFER_HOURS: "6"
          POLL_LOOKBACK_DAYS: "14"
          POLL_ENABLE_INLINE_ANALYSIS: "0"
        run: |
          date -u +"Ingestion UTC start: %Y-%m-%dT%H:%M:%SZ"
          python src/ingestion/poll.py
          date -u +"Ingestion UTC end: %Y-%m-%dT%H:%M:%SZ"

      - name: Run analysis (detectors + risk scoring)
        env:
          DB_BACKEND: "postgres"
          DATABASE_URL_RW: ${{ secrets.DATABASE_URL_RW }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_RW }}
          POLL_ENABLE_RISK_SCORING: "1"
        run: |
          date -u +"Analysis UTC start: %Y-%m-%dT%H:%M:%SZ"
          python src/analysis/run_analysis.py
          date -u +"Analysis UTC end: %Y-%m-%dT%H:%M:%SZ"

      - name: Quality gate (risk scores must exist)
        env:
          DB_BACKEND: "postgres"
          DATABASE_URL_RW: ${{ secrets.DATABASE_URL_RW }}
        run: |
          python - <<'PY'
          import os
          import sys

          from src.db.db_utils import get_conn

          dsn = os.getenv("DATABASE_URL_RW", "").strip()
          if not dsn:
              print("ERROR: DATABASE_URL_RW is not set", file=sys.stderr)
              sys.exit(1)

          try:
              with get_conn(path=None, backend="postgres", dsn=dsn) as conn:
                  count = conn.execute("SELECT COUNT(*) AS count FROM issuer_risk_scores").fetchone()["count"]
          except Exception as exc:
              print(f"ERROR: failed to query issuer_risk_scores: {exc}", file=sys.stderr)
              sys.exit(1)

          print(f"issuer_risk_scores rows: {count}")
          if int(count) <= 0:
              print("ERROR: issuer_risk_scores is empty after analysis.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            docs/reports/validation/**/*.json
            docs/reports/validation/**/*.md
          if-no-files-found: ignore
